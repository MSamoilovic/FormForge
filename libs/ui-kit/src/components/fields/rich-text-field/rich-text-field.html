<app-form-field-shell
  [label]="label()"
  [required]="required()"
  [errorMessage]="computedErrorMessage()"
  [hint]="hint()"
>
  <div class="rich-text-editor-wrapper">
    <div class="rich-text-toolbar">
      <button
        type="button"
        (click)="execCommand('bold', undefined, $event)"
        title="Bold"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideBold"></ng-icon>
      </button>
      <button
        type="button"
        (click)="execCommand('italic', undefined, $event)"
        title="Italic"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideItalic"></ng-icon>
      </button>
      <button
        type="button"
        (click)="execCommand('underline', undefined, $event)"
        title="Underline"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideUnderline"></ng-icon>
      </button>
      <div class="toolbar-divider"></div>
      <button
        type="button"
        (click)="execCommand('justifyLeft', undefined, $event)"
        title="Align Left"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideAlignLeft"></ng-icon>
      </button>
      <button
        type="button"
        (click)="execCommand('justifyCenter', undefined, $event)"
        title="Align Center"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideAlignCenter"></ng-icon>
      </button>
      <button
        type="button"
        (click)="execCommand('justifyRight', undefined, $event)"
        title="Align Right"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideAlignRight"></ng-icon>
      </button>
      <div class="toolbar-divider"></div>
      <button
        type="button"
        (click)="execCommand('insertUnorderedList', undefined, $event)"
        title="Bullet List"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideList"></ng-icon>
      </button>
      <button
        type="button"
        (click)="execCommand('insertOrderedList', undefined, $event)"
        title="Numbered List"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideListOrdered"></ng-icon>
      </button>
      <div class="toolbar-divider"></div>
      <button
        type="button"
        (click)="execCommand('removeFormat', undefined, $event)"
        title="Remove Formatting"
        [disabled]="formControl()?.disabled"
        class="toolbar-button"
      >
        <ng-icon name="lucideEraser"></ng-icon>
      </button>
    </div>
    <div
      #editor
      class="rich-text-editor"
      [contentEditable]="!formControl()?.disabled"
      [attr.aria-invalid]="formControl()?.invalid ? 'true' : 'false'"
      [attr.data-placeholder]="placeholder() || 'Enter text...'"
    ></div>
  </div>
</app-form-field-shell>
