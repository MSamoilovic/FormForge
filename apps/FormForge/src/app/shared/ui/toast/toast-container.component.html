<div
  class="pointer-events-none fixed bottom-0 right-0 z-[100] flex max-h-screen w-full flex-col gap-2 p-4 sm:max-w-[420px]"
>
  @for (toast of toasts(); track toast.id) {
    <app-toast
      [message]="toast.message"
      [type]="toast.type"
      [dismissible]="true"
      (dismiss)="removeToast(toast.id)"
    />
  }
</div>
