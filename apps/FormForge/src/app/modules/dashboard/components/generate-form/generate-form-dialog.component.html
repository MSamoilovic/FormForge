<app-dialog>
  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-title">
      <ng-icon name="lucideSparkles" size="24" class="text-indigo-500" />
      <h2>Create Form with AI</h2>
    </div>
    <button type="button" class="dialog-close" (click)="close()">
      <ng-icon name="lucideX" size="20" />
    </button>
  </div>

  <!-- Content -->
  <div class="px-6 pb-2">
    <p class="dialog-description">
      Describe the form you want to create. Be as specific as possible for the best results.
    </p>

    <div class="space-y-2">
      <label for="prompt" class="form-label">Your prompt</label>
      <textarea
        id="prompt"
        [formControl]="promptControl"
        rows="5"
        cdkTextareaAutosize
        cdkAutosizeMinRows="5"
        cdkAutosizeMaxRows="10"
        placeholder="e.g., Create a contact form with fields for name, email, phone number, and message. Include validation for required fields."
        class="form-textarea"
      ></textarea>
    </div>
  </div>

  <!-- Footer -->
  <app-dialog-footer>
    <button type="button" class="btn btn-ghost btn-md" (click)="close()">
      Cancel
    </button>
    <button
      type="button"
      class="btn btn-primary-gradient btn-md"
      [disabled]="promptControl.invalid || isLoading()"
      (click)="generate()"
    >
      @if (isLoading()) {
        <ng-icon name="lucideLoader2" size="18" class="animate-spin" />
        <span>Generating...</span>
      } @else {
        <ng-icon name="lucideSparkles" size="18" />
        <span>Generate Form</span>
      }
    </button>
  </app-dialog-footer>
</app-dialog>
