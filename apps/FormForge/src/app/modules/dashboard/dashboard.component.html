<div class="dashboard-container">
  <!-- Header -->
  <div class="dashboard-header">
    <h1 class="dashboard-title">My Forms</h1>
    <div class="dashboard-actions">
      <button type="button" class="btn btn-outline btn-md" (click)="generateFormFromText()">
        <ng-icon name="lucideSparkles" size="18" />
        <span>Create with AI</span>
      </button>
      <button type="button" class="btn btn-primary-gradient btn-md" (click)="createNewForm()">
        <ng-icon name="lucidePlus" size="18" />
        <span>Create New Form</span>
      </button>
    </div>
  </div>

  <div class="divider-line my-6"></div>

  <!-- Loading State -->
  @if (isLoading()) {
    <div class="loading-state">
      <ng-icon name="lucideLoader2" size="40" class="animate-spin text-indigo-500" />
      <p class="text-slate-500 dark:text-slate-400 mt-4">Loading forms...</p>
    </div>
  } @else {
    <!-- Form Cards Grid -->
    <div class="form-grid">
      @for (form of forms(); track form.id) {
        <div class="form-card group">
          <!-- Card Header -->
          <div class="form-card-header">
            <h3 class="form-card-title">{{ form.name }}</h3>
            <button 
              type="button" 
              class="card-menu-btn"
              title="Get embed code"
            >
              <ng-icon name="lucideCode" size="18" />
            </button>
          </div>

          <!-- Card Content -->
          <div class="form-card-content">
            <div class="form-card-stat">
              <ng-icon name="lucideFileText" size="16" />
              <span>{{ form.fields.length }} fields</span>
            </div>
          </div>

          <!-- Card Actions -->
          <div class="form-card-actions">
            <div class="action-buttons-left">
              <button type="button" class="action-btn action-btn-primary" (click)="editForm(form.id)">
                <ng-icon name="lucidePencil" size="16" />
                <span>Edit</span>
              </button>
              <a [routerLink]="['/submissions', form.id]" class="action-btn action-btn-secondary">
                <ng-icon name="lucideInbox" size="16" />
                <span>Submissions</span>
              </a>
            </div>
            <button 
              type="button" 
              class="action-btn-icon action-btn-danger" 
              (click)="deleteForm(form.id, form.name)"
              title="Delete form"
            >
              <ng-icon name="lucideTrash2" size="16" />
            </button>
          </div>
        </div>
      } @empty {
        <!-- Empty State -->
        <div class="empty-state">
          <div class="empty-state-icon">
            <ng-icon name="lucideFileText" size="48" />
          </div>
          <h3 class="empty-state-title">No forms yet</h3>
          <p class="empty-state-text">Create your first form to get started</p>
          <button type="button" class="btn btn-primary-gradient btn-md mt-4" (click)="createNewForm()">
            <ng-icon name="lucidePlus" size="18" />
            <span>Create Your First Form</span>
          </button>
        </div>
      }
    </div>
  }
</div>
