<app-auth-layout
  [title]="isSubmitted() ? 'Check your email' : 'Reset password'"
  [subtitle]="isSubmitted() ? '' : 'Enter your email and we\'ll send you a reset link'"
>
  @if (isSubmitted()) {
    <div class="text-center py-4">
      <!-- Success Icon -->
      <div class="mx-auto mb-6 w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg shadow-emerald-500/25 animate-scale-in">
        <ng-icon name="lucideMailCheck" class="text-4xl text-white" />
      </div>

      <p class="text-slate-600 dark:text-slate-300 mb-2">
        We've sent a password reset link to
      </p>
      <p class="font-semibold text-indigo-600 dark:text-indigo-400 mb-4">
        {{ submittedEmail() }}
      </p>

      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">
        Didn't receive the email? Check your spam folder or
        <button type="button" class="btn-link underline" (click)="resetForm()">
          try another email address
        </button>
      </p>

      <a routerLink="/auth/login" class="btn btn-outline btn-md">
        <ng-icon name="lucideArrowLeft" />
        Back to sign in
      </a>
    </div>
  } @else {
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <!-- Email -->
      <div class="space-y-2">
        <label for="email" class="form-label">Email</label>
        <div class="relative">
          <ng-icon name="lucideMail" class="form-icon" />
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
            class="form-input-icon"
            [class.form-input-error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
          />
        </div>
        @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
          <p class="form-error">{{ getErrorMessage() }}</p>
        }
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="isLoading()" class="btn btn-primary-gradient btn-lg btn-full">
        @if (isLoading()) {
          <ng-icon name="lucideLoader2" class="animate-spin" />
          <span>Sending...</span>
        } @else {
          <span>Send reset link</span>
          <ng-icon name="lucideSend" />
        }
      </button>

      <!-- Back Link -->
      <a routerLink="/auth/login" class="flex items-center justify-center gap-2 text-sm text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors mt-4">
        <ng-icon name="lucideArrowLeft" class="text-base" />
        Back to sign in
      </a>
    </form>
  }
</app-auth-layout>
