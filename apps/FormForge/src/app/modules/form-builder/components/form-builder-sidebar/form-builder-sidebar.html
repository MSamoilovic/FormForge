<app-card class="sidebar-card ff-card-full-height">
  <app-card-header>
    <app-card-title class="sidebar-title">
      <ng-icon name="lucideLayoutGrid"></ng-icon>
      <span>Toolbox</span>
    </app-card-title>
    <app-card-description>Drag fields to canvas</app-card-description>
  </app-card-header>
  <app-card-content class="sidebar-content">
    <div
      class="field-list"
      cdkDropList
      [cdkDropListData]="availableFields()"
      [cdkDropListConnectedTo]="['canvasDropList']"
    >
      @for (field of availableFields(); track field.type) {
        <div cdkDrag [cdkDragData]="field.type" class="field-item">
          <div class="field-item-icon">
            <ng-icon [name]="field.icon"></ng-icon>
          </div>
          <span class="field-item-label">{{ field.label }}</span>
          <ng-icon name="lucideGripVertical" class="drag-icon"></ng-icon>
        </div>
      }
    </div>
  </app-card-content>
</app-card>
