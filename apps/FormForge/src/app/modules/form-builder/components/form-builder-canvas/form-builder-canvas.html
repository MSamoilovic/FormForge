
<app-card class="canvas-card ff-card-full-height">
  @if (!canvasFields().length) {
    <app-card-header>
      <app-card-title class="canvas-title">
        <ng-icon name="lucideLayoutGrid" size="20" />
        <span>Canvas</span>
      </app-card-title>
      <app-card-description>Build your form here</app-card-description>
    </app-card-header>
  }

  <app-card-content
    id="canvasDropList"
    cdkDropList
    class="canvas-content"
    [class.has-fields]="canvasFields().length > 0"
    (cdkDropListDropped)="onDrop($event)"
  >
    @if (!canvasFields().length) {
      <div class="empty-state">
        <div class="empty-state-icon">
          <ng-icon name="lucideHand" size="48" />
        </div>
        <h3>Start Building Your Form</h3>
        <p>Drag and drop fields from the toolbox to begin</p>
        <div class="empty-state-hint">
          <ng-icon name="lucideArrowLeft" size="18" />
          <span>Choose a field type</span>
        </div>
      </div>
    } @else {
      @for (field of canvasFields(); track field.id) {
        <div
          cdkDrag
          class="canvas-field-wrapper"
          (click)="onSelectField(field)"
          [class.selected]="selectedField()?.id === field.id"
        >
          <div class="drag-handle" cdkDragHandle>
            <ng-icon name="lucideGripVertical" size="20" />
          </div>
          <div class="field-content ff-field-content">
            <ng-container
              [ngComponentOutlet]="getComponent(field.type)"
              [ngComponentOutletInputs]="getComponentInputs(field)"
            ></ng-container>
          </div>
          <div class="field-actions">
            <button
              type="button"
              class="action-button"
              (click)="onDuplicateField(field.id, $event)"
              title="Duplicate field (Ctrl/Cmd + D)"
            >
              <ng-icon name="lucideCopy" class="action-icon" size="18" />
            </button>
            <button
              type="button"
              class="action-button delete-button"
              (click)="onRemoveField(field.id, $event)"
              title="Remove field (Delete)"
            >
              <ng-icon name="lucideTrash2" class="action-icon" size="18" />
            </button>
          </div>
        </div>
      }
    }
  </app-card-content>
</app-card>
