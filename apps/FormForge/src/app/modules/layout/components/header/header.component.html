<header class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-indigo-600 to-violet-600 shadow-lg shadow-indigo-500/20">
  <div class="flex items-center gap-4 h-16 px-6 max-w-[1400px] mx-auto">
    <!-- Logo -->
    <a routerLink="/dashboard" class="flex items-center gap-2 text-white no-underline transition-transform hover:scale-[1.02]">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-white/20 backdrop-blur-sm">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H6v-2h6v2zm4-4H6v-2h10v2zm0-4H6V7h10v2z"/>
        </svg>
      </div>
      <span class="text-xl font-bold tracking-tight">{{ title }}</span>
    </a>

    <div class="flex-1"></div>

    @if (isAuthenticated()) {
      <!-- Navigation -->
      <nav class="flex items-center gap-1 mr-4">
        <a 
          routerLink="/dashboard" 
          routerLinkActive="bg-white/20 text-white" 
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        >
          Dashboard
        </a>
        <a 
          routerLink="/builder" 
          routerLinkActive="bg-white/20 text-white"
          class="px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        >
          New Form
        </a>
      </nav>

      <!-- Theme Toggle -->
      <button 
        type="button"
        (click)="toggleTheme()" 
        class="p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <ng-icon [name]="isDarkMode() ? 'lucideSun' : 'lucideMoon'" size="20" />
      </button>

      <!-- User Menu -->
      <div class="relative" (clickOutside)="closeUserMenu()">
        <button 
          type="button"
          (click)="toggleUserMenu()" 
          class="flex items-center gap-2 p-1.5 pr-2 rounded-lg hover:bg-white/10 transition-colors"
        >
          <div class="w-8 h-8 rounded-full flex items-center justify-center bg-gradient-to-br from-pink-400 to-rose-500 text-xs font-semibold text-white">
            {{ getInitials() }}
          </div>
          <ng-icon 
            name="lucideChevronDown" 
            size="16" 
            class="text-white/70 transition-transform duration-200"
            [class.rotate-180]="isUserMenuOpen()" 
          />
        </button>

        @if (isUserMenuOpen()) {
          <div class="absolute right-0 top-full mt-2 w-64 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
            <!-- User Info -->
            <div class="flex items-center gap-3 p-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 bg-gradient-to-br from-indigo-500 to-violet-600 text-sm font-semibold text-white">
                {{ getInitials() }}
              </div>
              <div class="flex flex-col overflow-hidden">
                <span class="text-sm font-medium text-slate-800 dark:text-white truncate">{{ currentUser()?.full_name || currentUser()?.username }}</span>
                <span class="text-xs text-slate-500 dark:text-slate-400 truncate">{{ currentUser()?.email }}</span>
              </div>
            </div>

            <div class="h-px bg-slate-200 dark:bg-slate-700"></div>

            <!-- Menu Items -->
            <a routerLink="/auth/profile" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer no-underline" (click)="closeUserMenu()">
              <ng-icon name="lucideUser" size="18" class="text-slate-400 dark:text-slate-500" />
              <span>My Profile</span>
            </a>
            <a routerLink="/dashboard" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer no-underline" (click)="closeUserMenu()">
              <ng-icon name="lucideLayoutDashboard" size="18" class="text-slate-400 dark:text-slate-500" />
              <span>Dashboard</span>
            </a>

            <div class="h-px bg-slate-200 dark:bg-slate-700"></div>

            <button type="button" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer no-underline w-full text-left" (click)="logout()">
              <ng-icon name="lucideLogOut" size="18" class="text-slate-400 dark:text-slate-500" />
              <span>Sign out</span>
            </button>
          </div>
        }
      </div>
    } @else {
      <!-- Theme Toggle (for non-authenticated) -->
      <button 
        type="button"
        (click)="toggleTheme()" 
        class="p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <ng-icon [name]="isDarkMode() ? 'lucideSun' : 'lucideMoon'" size="20" />
      </button>

      <!-- Auth Buttons -->
      <nav class="flex items-center gap-2 ml-4">
        <a routerLink="/auth/login" class="px-4 py-2 rounded-lg text-sm font-medium text-white/90 hover:text-white hover:bg-white/10 transition-colors">
          Sign in
        </a>
        <a routerLink="/auth/register" class="px-4 py-2 rounded-lg text-sm font-medium bg-white/95 text-indigo-600 hover:bg-white transition-colors">
          Get Started
        </a>
      </nav>
    }
  </div>
</header>
