<app-dialog>
  <app-dialog-header>
    <h2 hlmDialogTitle>Confirm Action</h2>
    <p hlmDialogDescription>{{ data.message }}</p>
  </app-dialog-header>
  <app-dialog-footer>
    <app-button variant="outline" (click)="onNoClick()">Cancel</app-button>
    <app-button variant="destructive" (click)="onConfirm()">Confirm</app-button>
  </app-dialog-footer>
</app-dialog>
